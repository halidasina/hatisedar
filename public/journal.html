  try{ const v=localStorage.getItem(k); const parsed = v?JSON.parse(v):null; console.log(`[sget] Retrieved ${k}:`, parsed); return parsed; }catch(e){ console.error(`[sget] Failed to retrieve ${k}:`, e); return null; }

const sset = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); console.log(`[sset] Stored ${k}:`, v); }catch(e){ console.error(`[sset] Failed to store ${k}:`, e); } };
const sgetBuyers = async () => {
  console.log("[sgetBuyers] Starting buyer fetch...");
  try{
    // Always try server first
    const r = await fetch("/.netlify/functions/get-buyers");
    if(!r.ok) {
      const errData = await r.json().catch(()=>({}));
      if(errData.error && (errData.error.includes("Netlify Blobs") || errData.error.includes("belum diaktifkan"))) {
        throw new Error("Netlify Blobs belum diaktifkan di dashboard Netlify.");
      }
      throw new Error(`Server error: ${r.status} - ${errData.error||''}`);
    }
    const data = await r.json();
    const serverBuyers = data.buyers || [];
    console.log("[sgetBuyers] Server returned:", serverBuyers);
    if(serverBuyers && Array.isArray(serverBuyers)){
      sset(BUYERS_KEY, serverBuyers);
      return serverBuyers;
    }
  }catch(e){
    console.warn("[sgetBuyers] Server fetch failed, trying fallback...", e);
  }
  // Fallback to local storage
  try{
    const local = JSON.parse(localStorage.getItem(BUYERS_KEY)||"[]");

      const ids = local.map(b=>b.id);
      return [...local,...DEMO_BUYERS.filter(d=>!ids.includes(d.id))];
    }
  }catch(e){ console.error("[sgetBuyers] Local storage error:", e); }
  return DEMO_BUYERS;
};

.mtab{padding:7px 16px;border-radius:100px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;cursor:pointer;white-space:nowrap;border:none;transition:all .2s;flex-shrink:0;}
.mtab.active{background:${C.gold};color:${C.deep};font-weight:700;}
.mtab:not(.active){background:${C.warm};color:${C.muted};border:1px solid rgba(196,151,90,.15);}
.ai-box{background:${C.deep};border-radius:18px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden;}
.ai-box::before{content:'✦';position:absolute;font-size:120px;color:${C.gold};opacity:.05;right:-20px;bottom:-30px;}
.ai-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:${C.gold};margin-bottom:8px;}
.ai-content{font-size:13px;color:rgba(255,255,255,.85);line-height:1.9;}
.ai-dot{width:8px;height:8px;border-radius:50%;background:${C.gold};animation:pulse 1.2s infinite;display:inline-block;margin-right:4px;}
.ai-dot:nth-child(2){animation-delay:.2s;} .ai-dot:nth-child(3){animation-delay:.4s;}
.modal-ov{position:fixed;inset:0;background:rgba(44,36,22,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:${C.cream};border-radius:24px 24px 0 0;padding:28px 22px 48px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;}
.m-handle{width:40px;height:4px;border-radius:100px;background:rgba(196,151,90,.3);margin:0 auto 20px;}
.m-close{float:right;background:none;border:none;font-size:20px;color:${C.muted};cursor:pointer;}
.empty{text-align:center;padding:48px 24px;color:${C.muted};}

/* ADMIN */
.adm{min-height:100vh;background:#0d0b07;}
.adm-nav{background:#1a1408;border-bottom:1px solid rgba(196,151,90,.2);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.adm-nav-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:${C.gold};font-style:italic;}
.adm-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:${C.deep};background:${C.gold};padding:3px 10px;border-radius:100px;}
.adm-body{max-width:1600px;margin:0 auto;padding:32px 3vw;width:100%;}
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.adm-stat{background:#1a1408;border:1px solid rgba(196,151,90,.15);border-radius:14px;padding:18px;text-align:center;}
.adm-stat-n{font-family:'Cormorant Garamond',serif;font-size:38px;color:${C.gold};line-height:1;}
.adm-stat-l{font-size:10px;color:${C.muted};font-family:'DM Mono',monospace;margin-top:4px;}
.adm-sec{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:${C.muted};margin-bottom:14px;text-transform:uppercase;}
.adm-add{background:#1a1408;border:1px solid rgba(196,151,90,.2);border-radius:16px;padding:24px;margin-bottom:24px;}
.adm-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;align-items:end;}
.adm-inp{width:100%;padding:10px 13px;background:rgba(255,255,255,.04);border:1px solid rgba(196,151,90,.2);border-radius:10px;color:white;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.adm-inp:focus{border-color:${C.gold};}
.adm-inp::placeholder{color:rgba(255,255,255,.2);}
.adm-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:${C.muted};margin-bottom:6px;display:block;}
.adm-table{width:100%;border-collapse:collapse;}
.adm-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:${C.muted};text-align:left;padding:10px 14px;border-bottom:1px solid rgba(196,151,90,.15);}
.adm-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:rgba(255,255,255,.8);vertical-align:middle;}
.adm-table tr:hover td{background:rgba(196,151,90,.04);}
.b-active{background:rgba(122,140,110,.2);color:${C.sageL};font-size:10px;padding:3px 10px;border-radius:100px;font-family:'DM Mono',monospace;}
.b-off{background:rgba(155,142,122,.1);color:${C.muted};font-size:10px;padding:3px 10px;border-radius:100px;font-family:'DM Mono',monospace;}
.pw-pill{font-family:'DM Mono',monospace;font-size:12px;color:${C.goldL};background:rgba(196,151,90,.12);padding:4px 10px;border-radius:6px;cursor:pointer;letter-spacing:1px;border:none;transition:all .2s;}
.pw-pill:hover{background:rgba(196,151,90,.22);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${C.gold};color:${C.deep};padding:10px 22px;border-radius:100px;font-size:12px;font-weight:700;font-family:'DM Mono',monospace;z-index:999;animation:up .3s ease;white-space:nowrap;}
.search{width:100%;padding:10px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(196,151,90,.2);border-radius:10px;color:white;font-size:13px;font-family:inherit;outline:none;margin-bottom:16px;}
.search::placeholder{color:rgba(255,255,255,.2);}
.cfm-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
.cfm-box{background:#1a1408;border:1px solid rgba(196,151,90,.2);border-radius:20px;padding:32px;max-width:360px;width:100%;text-align:center;}
.cfm-box h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:white;margin-bottom:8px;}
.cfm-box p{font-size:13px;color:${C.muted};margin-bottom:24px;line-height:1.6;}
.cfm-acts{display:flex;gap:10px;justify-content:center;}
.tbl-wrap{background:#1a1408;border:1px solid rgba(196,151,90,.15);border-radius:16px;overflow-x:auto;overflow-y:hidden;}

@keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.fade{animation:up .35s ease both;}
@media(min-width:1024px){
  .wrap{max-width:1400px;padding:32px 3vw 100px;}
  .adm-body{max-width:1600px;padding:32px 3vw;}
  .adm-grid{grid-template-columns:1fr 1fr 1fr 1fr;}
  .adm-stats{grid-template-columns:repeat(4,1fr);}
  .adm-table{font-size:13px;}
  .adm-table td{padding:12px 16px;}
}
@media(max-width:1023px){
  .wrap{max-width:100%;padding:24px 18px 100px;}
  .adm-body{max-width:100%;padding:24px 18px;}
  .adm-stats{grid-template-columns:1fr 1fr;}
  .adm-grid{grid-template-columns:1fr 1fr;}
  .adm-table td:nth-child(3),.adm-table th:nth-child(3){display:none;}
  .row2{grid-template-columns:1fr;}
}
`;

/* ════════════════════════════════════════════
   ADMIN DASHBOARD
════════════════════════════════════════════ */
function Admin({onLogout}) {
  const [buyers,setBuyers] = useState([]);
  const [search,setSearch] = useState("");
  const [name,setName]     = useState("");
  const [email,setEmail]   = useState("");
  const [pw,setPw]         = useState(()=>genPW());
  const [toast,setToast]   = useState("");
  const [cfm,setCfm]       = useState(null);

  const loadBuyers = async(manual = false) => {
    console.log("[Admin] Loading buyers...");
    if(manual) showToast("Memuatkan data dari server...");
    try{
      const r = await fetch("/.netlify/functions/get-buyers");
      if(!r.ok) {
        const errData = await r.json().catch(()=>({}));
        if(errData.error && (errData.error.includes("Netlify Blobs") || errData.error.includes("belum diaktifkan"))) {
          throw new Error("Netlify Blobs belum diaktifkan di dashboard Netlify.");
        }
        throw new Error(`Server error: ${r.status} - ${errData.error||''}`);
      }
      const data = await r.json();
      const serverBuyers = data.buyers || [];
      console.log("[Admin] Server buyers:", serverBuyers);
      setBuyers(serverBuyers);
      sset(BUYERS_KEY, serverBuyers);
      if(manual) showToast("✓ Data dikemaskini dari server ("+serverBuyers.length+" pembeli)");
    }catch(e){
      console.warn("[Admin] Server fetch failed:", e);
      if(manual) {
        if(e.message.includes("Netlify Blobs")) {
          showToast("⚠ Sila aktifkan Netlify Blobs di dashboard Netlify");
        } else {
          showToast("⚠ Gagal memuatkan data dari server");
        }
      }
      try{
        const local = JSON.parse(localStorage.getItem(BUYERS_KEY)||"[]");
        setBuyers(local);
      }catch(e2){
        setBuyers([]);
      }
    }
  };

  useEffect(()=>{
    loadBuyers();
  },[]);

  const save = async (list) => { 
    console.log("[Admin] Saving buyers:", list);
    setBuyers(list); 
    const result = await saveBuyers(list);
    return result;
  };
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3000); };

  const addBuyer = async () => {
    if(!name.trim()||!email.trim()||!pw.trim()){showToast("Nama, emel & password diperlukan!");return;}
    const eExists = buyers.find(b=>b.email&&b.email.toLowerCase()===email.trim().toLowerCase());
    if(eExists){showToast("Alamat emel sudah digunakan!");return;}
    const b={id:genId(),name:name.trim(),email:email.trim(),password:pw.trim(),createdAt:today(),active:true};
    console.log("[Admin] Adding buyer:", b);
    const synced = await save([...buyers,b]);
    setName(""); setEmail(""); setPw(genPW());
    if(synced){
      showToast("✓ Pembeli ditambah (TERSIMPAN KE SERVER)");
    } else {
      showToast("⚠ Pembeli ditambah TETAPI HANYA LOKAL - SILA AKTIFKAN BLOBS");
    }
  };

  const toggle   = id => { console.log("[Admin] Toggling buyer:", id); save(buyers.map(b=>b.id===id?{...b,active:!b.active}:b)); showToast("Status diubah"); };
  const resetPw  = id => { const p=prompt("Password baru untuk pengguna ini:"); if(!p||!p.trim()) return; console.log("[Admin] Resetting password for:", id); save(buyers.map(b=>b.id===id?{...b,password:p.trim()}:b)); showToast("✓ Password berjaya ditukar!"); };
  const delBuyer = id => { console.log("[Admin] Deleting buyer:", id); save(buyers.filter(b=>b.id!==id)); setCfm(null); showToast("✓ Pembeli dipadam."); };
  const copyEmail = e  => { try{navigator.clipboard.writeText(e);}catch{} console.log("[Admin] Copied email:", e); showToast("Disalin: "+e); };
  const copyPw   = p  => { try{navigator.clipboard.writeText(p);}catch{} console.log("[Admin] Copied password:", p); showToast("Disalin: "+p); };

  const active = buyers.filter(b=>b.active).length;
  const shown  = buyers.filter(b=>{
    const s=search.toLowerCase();
    return b.name.toLowerCase().includes(s)||
    (b.email||"").toLowerCase().includes(s);
  });

  return (
    <div className="adm">
      <div className="adm-nav">
        <div className="adm-nav-title">Hati Sedar</div>
        <span className="adm-badge">ADMIN DASHBOARD</span>
        <div style={{marginLeft:"auto"}}>
          <button className="btn btn-sm" style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:C.muted,fontSize:11,fontFamily:"'DM Mono',monospace"}} onClick={onLogout}>Log Keluar</button>
        </div>
      </div>
      <div className="adm-body">
        {/* Stats */}
        <div className="adm-stats">
          <div className="adm-stat" onClick={()=>loadBuyers(true)} style={{cursor:'pointer'}}>
            <div className="adm-stat-n">{buyers.length}</div>
            <div className="adm-stat-l">JUMLAH PEMBELI (KLIK UNTUK REFRESH)</div>
          </div>
          <div className="adm-stat"><div className="adm-stat-n">{active}</div><div className="adm-stat-l">AKTIF</div></div>
          <div className="adm-stat"><div className="adm-stat-n">{buyers.length-active}</div><div className="adm-stat-l">TIDAK AKTIF</div></div>
          <div className="adm-stat"><div className="adm-stat-n" style={{fontSize:18,paddingTop:10}}>RM{(buyers.length*14.90).toFixed(2)}</div><div className="adm-stat-l">JUMLAH HASIL</div></div>
        </div>

        {/* Add */}
        <div className="adm-add">
          <div className="adm-sec" style={{marginBottom:16}}>Tambah Pembeli Baru</div>
          <div className="adm-grid">
            <div><label className="adm-lbl">NAMA PENUH</label><input className="adm-inp" placeholder="cth: Siti Aminah" value={name} onChange={e=>setName(e.target.value)}/></div>
            <div><label className="adm-lbl">ALAMAT EMEL</label><input className="adm-inp" placeholder="cth: siti@gmail.com" value={email} autoCapitalize="none" autoCorrect="off" onChange={e=>setEmail(e.target.value)}/></div>
            <div>
              <label className="adm-lbl">PASSWORD &nbsp;<span style={{cursor:"pointer",color:C.gold}} onClick={()=>setPw(genPW())}>↻ Jana Baru</span></label>
              <input className="adm-inp" value={pw} onChange={e=>setPw(e.target.value)} style={{fontFamily:"'DM Mono',monospace",letterSpacing:1}}/>
            </div>
            <button className="btn btn-gold" onClick={addBuyer} disabled={!name.trim()||!email.trim()||!pw.trim()}>+ Tambah</button>
          </div>
          <p style={{fontSize:11,color:C.muted,marginTop:12,fontFamily:"'DM Mono',monospace"}}>
            💡 Password dijana secara automatik. Klik emel atau password dalam senarai untuk salin — kongsi kepada pembeli
          </p>
        </div>

        {/* Table */}
        <div className="adm-sec">Senarai Pembeli ({buyers.length})</div>
        <input className="search" placeholder="🔍  Cari nama atau emel..." value={search} onChange={e=>setSearch(e.target.value)}/>

        {shown.length===0
          ? <div className="empty" style={{color:C.muted}}>{buyers.length===0?"Belum ada pembeli. Tambah pembeli pertama anda!":"Tiada hasil carian."}</div>
          : <div className="tbl-wrap"><table className="adm-table">
              <thead><tr>
                <th>NAMA</th><th>ALAMAT EMEL</th><th>PASSWORD</th><th>TARIKH DAFTAR</th><th>STATUS</th><th>TINDAKAN</th>
              </tr></thead>
              <tbody>
                {shown.map(b=>(
                  <tr key={b.id}>
                    <td><div style={{fontWeight:600,color:"white"}}>{b.name}</div></td>
                    <td><button className="pw-pill" onClick={()=>copyEmail(b.email)} title="Klik untuk salin emel">{b.email}</button></td>
                    <td><button className="pw-pill" onClick={()=>copyPw(b.password)} title="Klik untuk salin password">{b.password}</button></td>
                    <td style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.muted}}>{fmtShort(b.createdAt)}</td>
                    <td><span className={b.active?"b-active":"b-off"}>{b.active?"Aktif":"Tidak Aktif"}</span></td>
                    <td>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        <button className="btn btn-sm" style={{background:"rgba(196,151,90,.1)",color:C.gold,border:"none",padding:"5px 10px",borderRadius:8,fontSize:10}} onClick={()=>copyPw(b.password)}>Salin PW</button>
                        <button className="btn btn-sm" style={{background:"rgba(91,138,139,.1)",color:C.teal,border:"none",padding:"5px 10px",borderRadius:8,fontSize:10}} onClick={()=>resetPw(b.id)}>Reset PW</button>
                        <button className="btn btn-sm" style={{background:b.active?"rgba(155,142,122,.1)":"rgba(122,140,110,.1)",color:b.active?C.muted:C.sage,border:"none",padding:"5px 10px",borderRadius:8,fontSize:10}} onClick={()=>toggle(b.id)}>{b.active?"Nyahaktif":"Aktifkan"}</button>
                        <button className="btn btn-sm" style={{background:"rgba(192,57,43,.1)",color:"#e74c3c",border:"none",padding:"5px 10px",borderRadius:8,fontSize:10}} onClick={()=>setCfm({id:b.id,name:b.name})}>Padam</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table></div>
        }
      </div>

      {cfm&&<div className="cfm-ov"><div className="cfm-box">
        <h3>Padam Pembeli?</h3>
        <p>Anda akan memadamkan <strong style={{color:"white"}}>{cfm.name}</strong> secara kekal.</p>
        <div className="cfm-acts">
          <button className="btn btn-out btn-sm" onClick={()=>setCfm(null)}>Batal</button>
          <button className="btn btn-sm" style={{background:"#e74c3c",color:"white",border:"none"}} onClick={()=>delBuyer(cfm.id)}>Padam</button>
        </div>
      </div></div>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

/* ════════════════════════════════════════════
   LOGIN GATE
════════════════════════════════════════════ */
function Gate({onBuyer, onAdmin}) {
  const [email,setEmail] = useState("");
  const [pw,setPw]       = useState("");
  const [err,setErr]     = useState("");
  const [busy,setBusy]   = useState(false);
  const [adm,setAdm]     = useState(false);
  const [apw,setApw]     = useState("");

  const login = async() => {
    if(!email.trim()){setErr("Sila masukkan alamat emel anda."); return;}
    if(!pw.trim()){setErr("Sila masukkan password."); return;}
    setBusy(true); setErr("");
    console.log("\n=== LOGIN ATTEMPT ===");
    console.log("[Gate] Email entered:", email);
    console.log("[Gate] Password entered:", pw);
    try{
      console.log("[Gate] Fetching buyers...");
      const buyers = await sgetBuyers();
      console.log("[Gate] Total buyers received:", buyers.length);
      console.log("[Gate] Buyers list:", buyers.map(b=>({id:b.id, name:b.name, email:b.email, password:b.password, active:b.active})));
      
      const emailNorm = email.trim().toLowerCase().replace(/\s+/g,'');
      const pwNorm = pw.trim();
      console.log("[Gate] Normalized email:", emailNorm);
      console.log("[Gate] Normalized password:", pwNorm);
      
      let found = false;
      const b = buyers.find(x=>{
        if(!x.active){
          console.log(`[Gate] Skipping inactive buyer: ${x.email}`);
          return false;
        }
        const storedEmailNorm = (x.email||"").trim().toLowerCase().replace(/\s+/g,'');
        const storedPwNorm = (x.password||"").trim();
        const emailMatch = storedEmailNorm === emailNorm;
        const pwMatch = storedPwNorm === pwNorm;
        console.log(`[Gate] Checking buyer: email='${x.email}' (norm='${storedEmailNorm}') emailMatch=${emailMatch}, pw='${x.password}' (norm='${storedPwNorm}') pwMatch=${pwMatch}`);
        if(emailMatch && pwMatch) found = true;
        return emailMatch && pwMatch;
      });
      
      if(b){ 
        console.log("[Gate] ✓ LOGIN SUCCESS for:", b.email);
        console.log("=== LOGIN ATTEMPT END ===");
        onBuyer(b); 
      }
      else { 
        console.log("[Gate] ✗ LOGIN FAILED: no matching buyer found");
        console.log("[Gate] Possible reasons:");
        console.log("  - Email not found in list");
        console.log("  - Password does not match");
        console.log("  - Buyer is inactive");
        console.log("=== LOGIN ATTEMPT END ===");
        setErr("Emel atau password salah. Sila cuba semula."); 
      }
    }catch(e){ 
      console.error("[Gate] LOGIN ERROR:", e);
      console.log("=== LOGIN ATTEMPT END ===");
      setErr("Masalah sambungan. Cuba semula."); 
    }
    setBusy(false);
  };


  const adminLogin = async() => {
    console.log("[Gate] Admin login attempt with password:", apw);
    if(apw===ADMIN_PW){ console.log("[Gate] Admin login successful"); onAdmin(); }
    else { console.log("[Gate] Admin login failed: wrong password"); setErr("Password admin salah."); }
  };

  return (
    <div className="gate-wrap">
      <div className="gate-box">
        {!adm ? <>
          <div className="gate-logo">
            <svg width="64" height="64" viewBox="0 0 90 90" fill="none">
              <circle cx="45" cy="45" r="42" fill={C.warm} stroke={C.gold} strokeWidth="1"/>
              <path d="M 26 72 L 26 46 Q 26 24, 45 24 Q 64 24, 64 46 L 64 72 Z" fill="none" stroke={C.gold} strokeWidth="1.2"/>
              <line x1="45" y1="65" x2="45" y2="40" stroke={C.sage} strokeWidth="1"/>
              <path d="M 45 53 C 39 47, 35 40, 40 35 C 42 33, 45 37, 45 43 Z" fill={C.sage} opacity="0.85"/>
              <path d="M 45 53 C 51 47, 55 40, 50 35 C 48 33, 45 37, 45 43 Z" fill={C.sage} opacity="0.65"/>
              <ellipse cx="45" cy="34" rx="2" ry="3" fill={C.sageL} opacity="0.9"/>
              <line x1="22" y1="72" x2="68" y2="72" stroke={C.gold} strokeWidth="1"/>
            </svg>
          </div>
          <div className="gate-brand">Muhasabah Journal</div>
          <div className="gate-sub">by Hati Sedar</div>
          <p style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.7}}>Log masuk dengan alamat emel dan password<br/>yang diberikan semasa pembelian.</p>

          <div className="lbl" style={{textAlign:"left",marginBottom:6}}>Alamat Emel</div>
          <input className="gate-inp" type="email" placeholder="emel@anda.com" value={email}
            autoCapitalize="none" autoCorrect="off" spellCheck="false"
            onChange={e=>{setEmail(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&login()}/>

          <div className="lbl" style={{textAlign:"left",marginBottom:6,marginTop:12}}>Password</div>
          <input className="gate-inp" type="password" placeholder="Masukkan password..." value={pw}
            onChange={e=>{setPw(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&login()}/>

          {err&&<div className="gate-err">{err}</div>}
          <button className="btn btn-gold" style={{width:"100%",justifyContent:"center",marginTop:16}} onClick={login} disabled={busy}>
            {busy?"Menyemak...":"Log Masuk ke Jurnal"}
          </button>
          <p style={{fontSize:12,color:C.muted,marginTop:16,lineHeight:1.7}}>Belum ada akses? Dapatkan Muhasabah Journal untuk bermula.</p>
          <div className="gate-adm" onClick={()=>{setAdm(true);setErr("");}}>· · ·</div>
        </> : <>
          <div className="gate-logo">
            <svg width="48" height="48" viewBox="0 0 90 90" fill="none">
              <circle cx="45" cy="45" r="42" fill={C.warm} stroke={C.gold} strokeWidth="1"/>
              <path d="M 26 72 L 26 46 Q 26 24, 45 24 Q 64 24, 64 46 L 64 72 Z" fill="none" stroke={C.gold} strokeWidth="1.2"/>
              <line x1="22" y1="72" x2="68" y2="72" stroke={C.gold} strokeWidth="1"/>
            </svg>

function Summary({entries,summaries,onSave,onLogout,onChangePw}) {
  const [sel,setSel]=useState(today().slice(0,7)); const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const months=[...new Set(Object.keys(entries).map(k=>k.slice(0,7)))].sort().reverse();
  const me=Object.entries(entries).filter(([k])=>k.startsWith(sel));
  const ex=summaries[sel];
  const gen=async()=>{
    if(!me.length) return; setBusy(true); setErr("");
    const lines=me.map(([d,e])=>{const p=[];if(e.mood)p.push("Mood:"+e.mood);if(e.niat)p.push("Niat:"+e.niat);if(e.s1||e.s2||e.s3)p.push("Syukur:"+[e.s1,e.s2,e.s3].filter(Boolean).join(";"));if(e.berjaya)p.push("Pencapaian:"+e.berjaya);if(e.luahan)p.push("Luahan:"+e.luahan);return fmtDate(d)+": "+p.join(" | ");}).join("\n\n");
    try{
      // API key handled server-side
      const prompt="Kamu mentor rohani yang memahami tasawuf dan psikologi Islam. Analisa entri jurnal muhasabah bulan "+mlbl(sel)+" dan berikan ringkasan bermakna dalam Bahasa Melayu.\n\nENTRI JURNAL:\n"+lines+"\n\nSila hasilkan dalam format ini (tanpa markdown):\n\nRINGKASAN BULAN INI\n[2-3 ayat ringkasan perjalanan jiwa]\n\nCORAK YANG DIPERHATIKAN\n[2-3 corak emosi atau tema]\n\nKEKUATAN ANDA BULAN INI\n[2-3 perkara positif]\n\nNASIHAT UNTUK BULAN HADAPAN\n[2-3 cadangan praktikal islamik]\n\nPENUTUP DOA\n[Doa atau kata semangat dari Al-Quran atau Hadis]";
      const r=await fetch("/.netlify/functions/reflect",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt})
      });
      const data=await r.json();
      if(data.error){ setErr("Ralat: "+data.error); setBusy(false); return; }
      const txt=data.text||"";
      if(!txt) throw new Error("Tiada respons dari AI");
      onSave(sel,{text:txt,generated:new Date().toISOString(),count:me.length});
    }catch(e){ setErr("Ralat: "+(e.message||"Semak API key dan cuba semula.")); }
    setBusy(false);
  };
  const fmt=txt=>txt.split(/\n(?=[A-Z\u00C0-\u024F][A-Z\u00C0-\u024F])/).filter(Boolean).map((s,i)=>{
    const ls=s.trim().split("\n"); const h=ls[0]; const b=ls.slice(1).join("\n").trim();
    return<div key={i} style={{marginBottom:20}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:C.gold,marginBottom:8}}>{h}</div><div style={{fontSize:13,color:"rgba(255,255,255,.85)",lineHeight:1.9}}>{b.split("\n").map((l,j)=><p key={j} style={{marginBottom:6}}>{l}</p>)}</div></div>;
  });
  return(<div className="wrap fade">
    <div className="pg-title">Ringkasan <em>AI</em></div><div className="pg-sub">Analisa perjalanan jiwa bulanan</div>
    {months.length===0?<div className="empty"><div style={{fontSize:48,marginBottom:12}}>✨</div><p>Belum ada entri.</p></div>:<>
      <div className="mtabs">{months.map(m=><button key={m} className={`mtab ${sel===m?"active":""}`} onClick={()=>setSel(m)}>{mlbl(m)}</button>)}</div>
      <div className="stats-row">
        <div className="stat-box"><div className="stat-n">{me.length}</div><div className="stat-l">ENTRI</div></div>
        <div className="stat-box"><div className="stat-n">{me.filter(([,e])=>e.s1||e.s2||e.s3).length}</div><div className="stat-l">HARI SYUKUR</div></div>
        <div className="stat-box"><div className="stat-n">{me.filter(([,e])=>e.mood==="😊"||e.mood==="🙂").length}</div><div className="stat-l">HARI POSITIF</div></div>
      </div>
      {!ex&&!busy&&<div className="card" style={{textAlign:"center"}}><div className="sec-tag" style={{marginBottom:8}}>JANA RINGKASAN AI</div><p style={{fontSize:12,color:C.muted,marginBottom:14}}>{me.length} entri untuk {mlbl(sel)}.</p><button className="btn btn-gold" onClick={gen} disabled={!me.length}>✨ Jana Sekarang</button>{err&&<p style={{fontSize:12,color:"#e88",marginTop:10}}>{err}</p>}</div>}
      {busy&&<div className="ai-box"><div className="ai-lbl">AI SEDANG MENGANALISA...</div><div><span className="ai-dot"/><span className="ai-dot"/><span className="ai-dot"/><span style={{fontSize:13,color:C.sageL,marginLeft:8}}>Membaca {me.length} entri...</span></div></div>}
      {ex&&!busy&&<><div className="ai-box"><div className="ai-lbl">RINGKASAN {mlbl(sel).toUpperCase()} — {ex.count} ENTRI</div><div className="ai-content">{fmt(ex.text)}</div></div><div style={{textAlign:"center"}}><button className="btn btn-out btn-sm" onClick={()=>onSave(sel,null)}>🔄 Jana Semula</button></div></>}
    </>}
    <SessionFooter onLogout={onLogout} onChangePw={onChangePw}/>
  </div>);
}

      {doa && (
        <div className="emosi-doa">
          <p>"{doa.doa}"</p>
          <small>{doa.src}</small>
        </div>
      )}
      {!doa && (
        <div className="emosi-doa">
          <p>"Sesungguhnya bersama kesukaran itu ada kemudahan."</p>
          <small>SURAH AL-INSYIRAH, 94:6</small>
        </div>
      )}

      <SessionFooter onLogout={onLogout} onChangePw={onChangePw}/>
    </div>
  );
}


function ChangePwModal({buyer, onClose, onSuccess}) {
  const [oldPw, setOldPw]   = useState("");
  const [newPw, setNewPw]   = useState("");
  const [confPw, setConfPw] = useState("");
  const [err, setErr]       = useState("");
  const [done, setDone]     = useState(false);

  const submit = async() => {
    setErr("");
    const trimmedOld = oldPw.trim();
    const trimmedNew = newPw.trim();
    
    if(!trimmedOld) { setErr("Sila masukkan password lama."); return; }
    if(!trimmedNew) { setErr("Sila masukkan password baru."); return; }
    if(trimmedNew.length < 6) { setErr("Password baru mestilah sekurang-kurangnya 6 aksara."); return; }
    if(trimmedNew !== confPw.trim()) { setErr("Password baru tidak sepadan."); return; }
    
    console.log("[ChangePw] Starting update process...");
    console.log("[ChangePw] Buyer in memory:", { id: buyer.id, email: buyer.email, password: buyer.password });
    console.log("[ChangePw] Old password entered (trimmed):", trimmedOld);

    // Update password on server
    try{
      // 1. First, re-fetch buyers to make sure we have the latest from DB
      console.log("[ChangePw] Re-fetching latest buyers from server to sync...");
      const latestBuyers = await sgetBuyers();
      const latestMe = latestBuyers.find(b => b.id === buyer.id);
      
      if (latestMe) {
        console.log("[ChangePw] Latest buyer from server:", { id: latestMe.id, email: latestMe.email, password: latestMe.password });
        if (trimmedOld !== latestMe.password.trim()) {
          console.error("[ChangePw] Password mismatch after re-fetch!");
          setErr("Password lama tidak betul (Mismatch with Server).");
          return;
        }
      }

      console.log("[ChangePw] Sending update request to server...");
      const r=await fetch("/.netlify/functions/update-password",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({buyerId:buyer.id, oldPassword:trimmedOld, newPassword:trimmedNew})
      });
      const data=await r.json();
      if(data.error){setErr(data.error);return;}
      
      const trimmedNewPw = newPw.trim();
      const local=sget(BUYERS_KEY)||[];
      const updatedLocal = local.map(b => b.id === buyer.id ? { ...b, password: trimmedNewPw } : b);
      sset(BUYERS_KEY, updatedLocal);
      
      // Update the active buyer state
      buyer.password = trimmedNewPw;
      
      setDone(true);
    }catch(e){setErr("Ralat menyimpan. Cuba semula.");}
  };

  return (
    <div className="modal-ov" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="m-handle"/>
        <button className="m-close" onClick={onClose}>✕</button>

        {!done ? <>
          <div style={{marginBottom:20}}>
            <div className="sec-tag">🔐 TUKAR PASSWORD</div>
            <p style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.6}}>
              Pilih password baru yang mudah diingat tapi sukar diteka.
            </p>
          </div>

          <div className="fg">
            <div className="lbl">Password Lama:</div>
            <input type="password" placeholder="Masukkan password semasa..."
              value={oldPw} onChange={e=>{setOldPw(e.target.value);setErr("");}}/>
          </div>

          <div className="fg">
            <div className="lbl">Password Baru:</div>
            <input type="password" placeholder="Minimum 6 aksara..."
              value={newPw} onChange={e=>{setNewPw(e.target.value);setErr("");}}/>
          </div>

          <div className="fg">
            <div className="lbl">Sahkan Password Baru:</div>
            <input type="password" placeholder="Taip semula password baru..."
              value={confPw} onChange={e=>{setConfPw(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>

          {err && (
            <div style={{padding:"10px 14px",background:"rgba(192,57,43,.08)",border:"1px solid rgba(192,57,43,.2)",borderRadius:10,fontSize:12,color:"#c0392b",marginBottom:14}}>
              {err}
            </div>
          )}

          <button className="btn btn-gold" onClick={submit} style={{width:"100%",justifyContent:"center"}}>
            Tukar Password →
          </button>
          <p style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:10,fontFamily:"'DM Mono',monospace"}}>
            Simpan password baru anda di tempat yang selamat
          </p>
        </> : <>
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:52,marginBottom:16}}>✅</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:C.deep,marginBottom:8}}>
              Password Berjaya Ditukar!
            </div>
            <p style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.7}}>
              Password anda telah dikemaskini.<br/>
              Gunakan password baru untuk log masuk akan datang.
            </p>
            <div style={{background:C.warm,borderRadius:12,padding:"12px 20px",marginBottom:24,fontFamily:"'DM Mono',monospace",fontSize:12,color:C.mid,border:"1px solid rgba(196,151,90,.15)"}}>
              Password baru: <strong style={{color:C.goldL}}>{newPw}</strong>
            </div>
            <button className="btn btn-gold" onClick={()=>{onSuccess(buyer);}} style={{justifyContent:"center"}}>
              Selesai ✓
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}

function SessionFooter({onLogout, onChangePw}) {
  return (
    <div style={{maxWidth:620,margin:"0 auto",padding:"0 18px 48px",textAlign:"center"}}>
      <div style={{height:1,background:"rgba(196,151,90,.12)",marginBottom:24}}/>
      <div style={{marginBottom:12}}>
        <svg width="28" height="28" viewBox="0 0 90 90" fill="none" style={{margin:"0 auto",display:"block",opacity:.4}}>
          <path d="M 26 72 L 26 46 Q 26 24, 45 24 Q 64 24, 64 46 L 64 72 Z" fill="none" stroke="#C4975A" strokeWidth="1.5"/>
          <line x1="45" y1="65" y2="40" x2="45" stroke="#7A8C6E" strokeWidth="1.2"/>
          <path d="M 45 53 C 39 47, 35 40, 40 35 C 42 33, 45 37, 45 43 Z" fill="#7A8C6E" opacity="0.8"/>
          <path d="M 45 53 C 51 47, 55 40, 50 35 C 48 33, 45 37, 45 43 Z" fill="#7A8C6E" opacity="0.6"/>
          <line x1="22" y1="72" x2="68" y2="72" stroke="#C4975A" strokeWidth="1"/>
        </svg>
      </div>
      <p style={{fontSize:11,color:"#9B8E7A",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:16}}>HATI SEDAR</p>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        <button className="btn btn-gold" onClick={onLogout} style={{fontSize:13,padding:"12px 28px"}}>
          🔒 Tamat Sesi
        </button>
        <button className="btn" onClick={onChangePw} style={{fontSize:13,padding:"12px 28px",background:"rgba(196,151,90,.1)",color:"#9A7040",border:"1px solid rgba(196,151,90,.3)"}}>
          🔑 Tukar Password
        </button>
      </div>
      <p style={{fontSize:10,color:"rgba(155,142,122,.5)",marginTop:12,fontFamily:"'DM Mono',monospace",letterSpacing:1}}>
        Data anda tersimpan selamat
      </p>
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════ */
function App() {
  const [view,setView]   = useState("gate"); // gate | splash | journal | admin
  const [buyer,setBuyer] = useState(null);
  const [page,setPage]   = useState("home");
  const [entries,setE]   = useState({});
  const [summs,setSumms] = useState({});
  const [saveSt,setSaveSt] = useState("saved");
  const [showChangePw, setShowChangePw] = useState(false);
  const timer = useRef(null);

  // Restore session on load
  useEffect(()=>{
    const restore = async() => {
      const s = JSON.parse(sessionStorage.getItem(SESSION_KEY)||"null");
      if(s?.buyerId){
        try{
          const buyers = await sgetBuyers();
          const b = buyers.find(x=>x.id===s.buyerId&&x.active);
          if(b){ setBuyer(b); loadJ(b.id); setView("splash"); }
        }catch(e){}
      }
    };
    restore();
  },[]);

  const loadJ = id => {
    setE(sget(JOURNAL_PRE+"e_"+id)||{});
    setSumms(sget(JOURNAL_PRE+"s_"+id)||{});
  };

  const handleBuyer = b => {
    setBuyer(b); sessionStorage.setItem(SESSION_KEY,JSON.stringify({buyerId:b.id}));
    loadJ(b.id); setView("splash");
  };

  const logout = () => {
    sessionStorage.removeItem(SESSION_KEY);
    setBuyer(null); setE({}); setSumms({});
    setView("gate"); setPage("home");
  };

  const saveEntry = useCallback((date,data)=>{
    if(!buyer) return;
    setE(prev=>{
      const next={...prev,[date]:data};
      setSaveSt("saving");
      if(timer.current) clearTimeout(timer.current);
      timer.current=setTimeout(()=>{ sset(JOURNAL_PRE+"e_"+buyer.id,next); setSaveSt("saved"); },700);
      return next;
    });
  },[buyer]);

  const saveSumm = useCallback((month,data)=>{
    if(!buyer) return;
    setSumms(prev=>{
      const next=data?{...prev,[month]:data}:Object.fromEntries(Object.entries(prev).filter(([k])=>k!==month));
      sset(JOURNAL_PRE+"s_"+buyer.id,next);
      return next;
    });
  },[buyer]);

  const TABS = [{id:"home",l:"Utama",e:"🏠"},{id:"harian",l:"Harian",e:"☀️"},{id:"emosi",l:"Emosi",e:"💛"},{id:"history",l:"Sejarah",e:"📖"},{id:"summary",l:"Ringkasan AI",e:"✨"}];

  return(<div style={{height:'100%', display:'flex', flexDirection:'column', overflow:'hidden'}}>
    <style>{STYLE}</style>
    {view==="admin" && <Admin onLogout={()=>setView("gate")}/>}
    {view==="gate"  && <Gate onBuyer={handleBuyer} onAdmin={()=>setView("admin")}/>}
    {showChangePw && buyer && (
      <ChangePwModal
        buyer={buyer}
        onClose={()=>setShowChangePw(false)}
        onSuccess={(b)=>{setBuyer({...b});setShowChangePw(false);}}
      />
    )}
    {view==="splash"&&
      <div className="splash" style={{flex:1}}>
        <div className="orb orb1"/><div className="orb orb2"/>
        <div className="splash-geo">✦</div>
        <button className="s-logout" onClick={logout}>Log Keluar</button>
        <div style={{marginBottom:24,animation:"up .6s .15s both",display:"flex",justifyContent:"center"}}>
        <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="45" r="42" fill="#1A1408" stroke="#C4975A" strokeWidth="0.6" opacity="0.45"/>
          <path d="M 26 72 L 26 46 Q 26 24, 45 24 Q 64 24, 64 46 L 64 72 Z" fill="none" stroke="#C4975A" strokeWidth="1.2"/>
          <path d="M 30 70 L 30 47 Q 30 29, 45 29 Q 60 29, 60 47 L 60 70 Z" fill="none" stroke="#C4975A" strokeWidth="0.4" opacity="0.2"/>
          <line x1="45" y1="65" y2="40" x2="45" stroke="#7A8C6E" strokeWidth="1.1"/>
          <path d="M 45 53 C 39 47, 35 40, 40 35 C 42 33, 45 37, 45 43 Z" fill="#7A8C6E" opacity="0.85"/>
          <path d="M 45 53 C 51 47, 55 40, 50 35 C 48 33, 45 37, 45 43 Z" fill="#7A8C6E" opacity="0.65"/>
          <ellipse cx="45" cy="34" rx="2" ry="3" fill="#B8C4AD" opacity="0.9"/>
          <line x1="22" y1="72" x2="68" y2="72" stroke="#C4975A" strokeWidth="1"/>
          <line x1="18" y1="76" x2="72" y2="76" stroke="#C4975A" strokeWidth="0.4" opacity="0.35"/>
          <line x1="45" y1="16" x2="45" y2="23" stroke="#C4975A" strokeWidth="0.7" opacity="0.6"/>
          <line x1="41.5" y1="19.5" x2="48.5" y2="19.5" stroke="#C4975A" strokeWidth="0.7" opacity="0.6"/>
          <line x1="42.6" y1="16.8" x2="47.4" y2="22.2" stroke="#C4975A" strokeWidth="0.7" opacity="0.6"/>
          <line x1="47.4" y1="16.8" x2="42.6" y2="22.2" stroke="#C4975A" strokeWidth="0.7" opacity="0.6"/>
        </svg>
      </div>
        <div className="s-badge">Jurnal Digital · Muhasabah Diri</div>
        <h1 className="s-title">Muhasabah<br/><em>Journal</em></h1>
        <div className="s-rule"/>
        <p className="s-sub">Jurnal harian untuk mengenal diri, mensyukuri nikmat, dan sedar akan kehadiran Allah.</p>
        <button className="s-btn" onClick={()=>{setView("journal"); setPage("home");}}>{Object.keys(entries).length>0?"Sambung Menulis →":"Mula Sekarang →"}</button>
        <p className="s-name">Selamat datang, {buyer?.name}</p>
      </div>
    }
    {view==="journal"&&<div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
      <nav className="nav">
        <div className="nav-brand">Muhasabah</div>
        {TABS.map(t=><button key={t.id} className={`nav-tab ${page===t.id?"active":""}`} onClick={()=>setPage(t.id)}>{t.e} {t.l}</button>)}
        <div className="nav-right">
          <div className={`save-dot ${saveSt}`}>{saveSt==="saving"?"• menyimpan":"✓"}</div>
          <button className="nav-out" onClick={logout}>Keluar</button>
        </div>
      </nav>
      <div style={{flex:1, overflowY:'auto', overflowX:'hidden'}}>
        {page==="home"    &&<Home     entries={entries} nav={setPage} name={buyer?.name||""} onLogout={logout} onChangePw={()=>setShowChangePw(true)}/>}
        {page==="harian"  &&<Harian   entries={entries} onSave={saveEntry} onLogout={logout} onChangePw={()=>setShowChangePw(true)}/>}
        {page==="emosi"   &&<Emosi    entries={entries} onSave={saveEntry} onLogout={logout} onChangePw={()=>setShowChangePw(true)}/> }
        {page==="history" &&<History  entries={entries} onLogout={logout} onChangePw={()=>setShowChangePw(true)}/>}
        {page==="summary" &&<Summary  entries={entries} summaries={summs} onSave={saveSumm} onLogout={logout} onChangePw={()=>setShowChangePw(true)}/>}
      </div>
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
